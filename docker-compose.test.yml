# Isolated test environment — uses separate DB and MinIO instances.
# Start with: docker compose -f docker-compose.test.yml up -d
version: "3.8"

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bistec_studio_test
      POSTGRES_USER: bistec
      POSTGRES_PASSWORD: bistec
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data

  minio-test:
    image: minio/minio:latest
    command: server /data --console-address ":9002"
    ports:
      - "127.0.0.1:9002:9001"
      - "9010:9000"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    tmpfs:
      - /data
