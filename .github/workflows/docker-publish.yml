name: Build and push Docker image

# Single image serves both the web app and the scheduler worker (the
# scheduler service just overrides CMD — see docker-compose.yml). Coolify
# pulls the same tag for both resources.
on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Trigger Coolify to pull the freshly-pushed :latest and redeploy both
      # resources that run this image. Requires the COOLIFY_API_TOKEN repo
      # secret (Coolify → Keys & Tokens → create an API token with deploy scope).
      - name: Redeploy app on Coolify
        run: |
          curl -fsS -X GET \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            "https://coolify.bistecglobal.com/api/v1/deploy?uuid=nck8s530pseqdcfxt50hndl5&force=false"

      - name: Redeploy scheduler on Coolify
        run: |
          curl -fsS -X GET \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            "https://coolify.bistecglobal.com/api/v1/deploy?uuid=warr96qhvzrie5ndwv8oteeu&force=false"
